syntax = "proto3";

package planning;

service PlanningService {
  rpc SetInitialPose (SetInitialPoseRequest) returns (PoseReply);
  rpc SetGoalPosition (SetGoalPositionRequest) returns (PoseReply);
  rpc GetPoseInitializeStatus (GetPoseInitializeStatusRequest) returns (PoseInitializeStatusReply);
  rpc GetRoutingStatus (GetRoutingStatusRequest) returns (RoutingStatusReply);
  rpc SetInitialPose(SetInitialPoseRequest) returns (PoseReply);
  rpc SetGoalPosition(SetGoalPositionRequest) returns (PoseReply);
  rpc GetMapDownloadLink(GetMapDownloadLinkRequest) returns (GetMapDownloadLinkResponse);
  rpc GoToDestination(GoToDestinationRequest) returns (GoToDestinationResponse);
  rpc GetPathToDestination(GetPathRequest) returns (GetPathResponse);
  rpc GetCurrentPose(GetCurrentPoseRequest) returns (GetCurrentPoseResponse);
}

message SetInitialPoseRequest {
  optional double x = 1;
  optional double y = 2;
}

message SetGoalPositionRequest {
  optional double x = 1;
  optional double y = 2;
}

message PoseReply {
  bool success = 1;
  double x = 2;
  double y = 3;
  double yaw = 4;
  string message = 5;
}

message GetMapDownloadLinkRequest {}

message GetMapDownloadLinkResponse {
  string osm_link = 1;
  string pcd_link = 2;
}

message GoToDestinationRequest {}

message GoToDestinationResponse {
  bool success = 1;
  string message = 2;
}

message GetPathRequest {}

message GetPathResponse {
  repeated Position path = 1;
}

message Position {
  double x = 1;
  double y = 2;
}

message GetCurrentPoseRequest {}

message GetCurrentPoseResponse {
  double x = 1;
  double y = 2;
  double direction = 3;
}

message GetPoseInitializeStatusRequest
{

}

message PoseInitializeStatusReply
{
  PoseInitializeStatus status = 1;
}

enum PoseInitializeStatus
{
  UNINITIALIZED = 0;
  INITIALIZING = 1;
  INITIALIZED = 2;
}

message GetRoutingStatusRequest
{

}

message RoutingStatusReply
{
  RoutingStatus status = 1;
}

enum RoutingStatus
{
  ROUTING_UNKNOWN = 0;
  UNSET = 1;
  WAITING_FOR_ROUTE = 2;
  SETTING_ROUTE = 3;
  ROUTED = 4;
  ARRIVED = 5;
  ABORTED = 6;
}